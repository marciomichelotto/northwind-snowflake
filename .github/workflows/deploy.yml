name: Deploy Snowflake

on:
  push:
    branches:
      - main
      - 'feature/**'
  workflow_dispatch:

jobs:

  deploy-qa:
    name: Deploy to QA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs

      - name: Configure Snowflake connection (QA)
        run: |
          mkdir -p ~/.snowflake
          printf '[connections.default]\naccount = "MKQAYBK-CK27934"\nuser = "MARCIOMICHELOTTO"\npassword = "%s"\nrole = "ACCOUNTADMIN"\nwarehouse = "COMPUTE_WH"\ndatabase = "FORMACAO"\nschema = "QA"\n' "${{ secrets.SNOWFLAKE_PASSWORD }}" > ~/.snowflake/config.toml
          chmod 0600 ~/.snowflake/config.toml

      - name: Deploy Tables - Bronze (QA)
        run: |
          for f in snowflake/tables/bronze/*.sql; do
            echo "Deploying $f to QA"
            snow sql -f "$f"
          done

      - name: Deploy Tables - Silver (QA)
        run: |
          for f in snowflake/tables/silver/*.sql; do
            echo "Deploying $f to QA"
            snow sql -f "$f"
          done

      - name: Deploy Tables - Gold (QA)
        run: |
          for f in snowflake/tables/gold/*.sql; do
            echo "Deploying $f to QA"
            snow sql -f "$f"
          done

      - name: Deploy Procedures - Bronze (QA)
        run: |
          for f in snowflake/procedures/bronze/*.sql; do
            echo "Deploying $f to QA"
            snow sql -f "$f"
          done

      - name: Deploy Procedures - Silver (QA)
        run: |
          for f in snowflake/procedures/silver/*.sql; do
            echo "Deploying $f to QA"
            snow sql -f "$f"
          done

      - name: Deploy Procedures - Gold (QA)
        run: |
          for f in snowflake/procedures/gold/*.sql; do
            echo "Deploying $f to QA"
            snow sql -f "$f"
          done

      - name: Deploy Tasks (QA)
        run: snow sql -f snowflake/tasks/tasks_pipeline.sql

      - name: QA deploy completed
        run: echo "Deploy QA concluido com sucesso!"

  deploy-prd:
    name: Deploy to PRD
    runs-on: ubuntu-latest
    needs: deploy-qa
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs

      - name: Configure Snowflake connection (PRD)
        run: |
          mkdir -p ~/.snowflake
          printf '[connections.default]\naccount = "MKQAYBK-CK27934"\nuser = "MARCIOMICHELOTTO"\npassword = "%s"\nrole = "ACCOUNTADMIN"\nwarehouse = "COMPUTE_WH"\ndatabase = "FORMACAO"\nschema = "PRD"\n' "${{ secrets.SNOWFLAKE_PASSWORD }}" > ~/.snowflake/config.toml
          chmod 0600 ~/.snowflake/config.toml

      - name: Deploy Tables - Bronze (PRD)
        run: |
          for f in snowflake/tables/bronze/*.sql; do
            echo "Deploying $f to PRD"
            snow sql -f "$f"
          done

      - name: Deploy Tables - Silver (PRD)
        run: |
          for f in snowflake/tables/silver/*.sql; do
            echo "Deploying $f to PRD"
            snow sql -f "$f"
          done

      - name: Deploy Tables - Gold (PRD)
        run: |
          for f in snowflake/tables/gold/*.sql; do
            echo "Deploying $f to PRD"
            snow sql -f "$f"
          done

      - name: Deploy Procedures - Bronze (PRD)
        run: |
          for f in snowflake/procedures/bronze/*.sql; do
            echo "Deploying $f to PRD"
            snow sql -f "$f"
          done

      - name: Deploy Procedures - Silver (PRD)
        run: |
          for f in snowflake/procedures/silver/*.sql; do
            echo "Deploying $f to PRD"
            snow sql -f "$f"
          done

      - name: Deploy Procedures - Gold (PRD)
        run: |
          for f in snowflake/procedures/gold/*.sql; do
            echo "Deploying $f to PRD"
            snow sql -f "$f"
          done

      - name: Deploy Tasks (PRD)
        run: snow sql -f snowflake/tasks/tasks_pipeline.sql

      - name: PRD deploy completed
        run: echo "Deploy PRD concluido com sucesso!"
