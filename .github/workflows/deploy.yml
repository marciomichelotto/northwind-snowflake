name: Deploy Snowflake View

env:
  SCHEMA_PRD: PRD
  SNOWSQL_DATABASE: FORMACAO

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - prod

jobs:
  dev:
    if: |
      (github.event_name == 'push' && github.ref != 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libaio1 libncurses6 alien

      - name: Download and install SnowSQL via RPM
        run: |
          wget https://sfc-repo.snowflakecomputing.com/snowsql/bootstrap/1.4/linux_x86_64/snowflake-snowsql-1.4.1-1.x86_64.rpm
          sudo alien -i snowflake-snowsql-1.4.1-1.x86_64.rpm

      - name: Add SnowSQL to PATH
        run: echo "/usr/bin" >> "$GITHUB_PATH"

      - name: Check SnowSQL installation
        run: which snowsql && snowsql -v

      - name: Run changed SQL scripts on DEV
        env:
          SNOWSQL_ACCOUNT: ${{ secrets.SNOWSQL_ACCOUNT }}
          SNOWSQL_USER: ${{ secrets.SNOWSQL_USER }}
          SNOWSQL_PWD: ${{ secrets.SNOWSQL_PWD }}
        run: |
          set -e
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            MODIFIED_FILES=$(git diff --name-only HEAD~1 HEAD | grep '^snowflake/.*\.sql$' || true)
          else
            MODIFIED_FILES=$(git show --pretty='' --name-only HEAD | grep '^snowflake/.*\.sql$' || true)
          fi

          if [ -z "$MODIFIED_FILES" ]; then
            echo "No .sql files changed."
            exit 0
          fi

          ORDERED_FILES=$(echo "$MODIFIED_FILES" | while read -r file; do
            if [[ "$file" == *"/tasks/"* ]]; then
              echo "4:$file"
            elif [[ "$file" == *"/bronze/"* ]]; then
              echo "1:$file"
            elif [[ "$file" == *"/silver/"* ]]; then
              echo "2:$file"
            elif [[ "$file" == *"/gold/"* ]]; then
              echo "3:$file"
            else
              echo "0:$file"
            fi
          done | sort -t: -k1,1n | cut -d: -f2-)

          for file in $ORDERED_FILES; do
            echo "Running $file on schema DEV"
            OUTPUT=$(snowsql -a "$SNOWSQL_ACCOUNT" -u "$SNOWSQL_USER" \
              -d "$SNOWSQL_DATABASE" -s DEV \
              -h "$SNOWSQL_ACCOUNT.snowflakecomputing.com" -p 443 \
              -f "$file")
            echo "$OUTPUT"

            if [[ "$file" == snowflake/procedures/* ]]; then
              PROC_NAME=$(echo "$OUTPUT" | grep -oP 'Function \K[^ ]+' | head -1)
              if [[ -n "$PROC_NAME" ]]; then
                echo "Calling procedure $PROC_NAME on schema DEV"
                snowsql -a "$SNOWSQL_ACCOUNT" -u "$SNOWSQL_USER" \
                  -d "$SNOWSQL_DATABASE" -s DEV \
                  -h "$SNOWSQL_ACCOUNT.snowflakecomputing.com" -p 443 \
                  -q "CALL $PROC_NAME();"
              else
                echo "Could not extract the procedure name from the SnowSQL output for file $file"
              fi
            fi
          done

  qa:
    if: |
      (github.event_name == 'push' && github.ref != 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'qa')
    runs-on: ubuntu-22.04
    needs: dev
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libaio1 libncurses6 alien

      - name: Download and install SnowSQL via RPM
        run: |
          wget https://sfc-repo.snowflakecomputing.com/snowsql/bootstrap/1.4/linux_x86_64/snowflake-snowsql-1.4.1-1.x86_64.rpm
          sudo alien -i snowflake-snowsql-1.4.1-1.x86_64.rpm

      - name: Add SnowSQL to PATH
        run: echo "/usr/bin" >> "$GITHUB_PATH"

      - name: Check SnowSQL installation
        run: which snowsql && snowsql -v

      - name: Run changed SQL scripts on QA
        env:
          SNOWSQL_ACCOUNT: ${{ secrets.SNOWSQL_ACCOUNT }}
          SNOWSQL_USER: ${{ secrets.SNOWSQL_USER }}
          SNOWSQL_PWD: ${{ secrets.SNOWSQL_PWD }}
        run: |
          set -e
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            MODIFIED_FILES=$(git diff --name-only HEAD~1 HEAD | grep '^snowflake/.*\.sql$' || true)
          else
            MODIFIED_FILES=$(git show --pretty='' --name-only HEAD | grep '^snowflake/.*\.sql$' || true)
          fi

          if [ -z "$MODIFIED_FILES" ]; then
            echo "No .sql files changed."
            exit 0
          fi

          ORDERED_FILES=$(echo "$MODIFIED_FILES" | while read -r file; do
            if [[ "$file" == *"/tasks/"* ]]; then
              echo "4:$file"
            elif [[ "$file" == *"/bronze/"* ]]; then
              echo "1:$file"
            elif [[ "$file" == *"/silver/"* ]]; then
              echo "2:$file"
            elif [[ "$file" == *"/gold/"* ]]; then
              echo "3:$file"
            else
              echo "0:$file"
            fi
          done | sort -t: -k1,1n | cut -d: -f2-)

          for file in $ORDERED_FILES; do
            echo "Running $file on schema QA"
            OUTPUT=$(snowsql -a "$SNOWSQL_ACCOUNT" -u "$SNOWSQL_USER" \
              -d "$SNOWSQL_DATABASE" -s QA \
              -h "$SNOWSQL_ACCOUNT.snowflakecomputing.com" -p 443 \
              -f "$file")
            echo "$OUTPUT"

            if [[ "$file" == snowflake/procedures/* ]]; then
              PROC_NAME=$(echo "$OUTPUT" | grep -oP 'Function \K[^ ]+' | head -1)
              if [[ -n "$PROC_NAME" ]]; then
                echo "Calling procedure $PROC_NAME on schema QA"
                snowsql -a "$SNOWSQL_ACCOUNT" -u "$SNOWSQL_USER" \
                  -d "$SNOWSQL_DATABASE" -s QA \
                  -h "$SNOWSQL_ACCOUNT.snowflakecomputing.com" -p 443 \
                  -q "CALL $PROC_NAME();"
              else
                echo "Could not extract the procedure name from the SnowSQL output for file $file"
              fi
            fi
          done

  prod:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
    runs-on: ubuntu-22.04
    needs: [dev, qa]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libaio1 libncurses6 alien

      - name: Download and install SnowSQL via RPM
        run: |
          wget https://sfc-repo.snowflakecomputing.com/snowsql/bootstrap/1.4/linux_x86_64/snowflake-snowsql-1.4.1-1.x86_64.rpm
          sudo alien -i snowflake-snowsql-1.4.1-1.x86_64.rpm

      - name: Add SnowSQL to PATH
        run: echo "/usr/bin" >> "$GITHUB_PATH"

      - name: Check SnowSQL installation
        run: which snowsql && snowsql -v

      - name: Debug - Test Snowflake Connection
        env:
          SNOWSQL_ACCOUNT: ${{ secrets.SNOWSQL_ACCOUNT }}
          SNOWSQL_USER: ${{ secrets.SNOWSQL_USER }}
          SNOWSQL_PWD: ${{ secrets.SNOWSQL_PWD }}
        run: |
          echo "Testing connection to Snowflake..."
          echo "Account: ${SNOWSQL_ACCOUNT}"
          echo "User: ${SNOWSQL_USER}"
          echo "Database: ${{ env.SNOWSQL_DATABASE }}"
          echo "Schema: ${{ env.SCHEMA_PRD }}"
          
          # Test connection with simple query
          snowsql -a "$SNOWSQL_ACCOUNT" -u "$SNOWSQL_USER" \
            -d "$SNOWSQL_DATABASE" -s "$SCHEMA_PRD" \
            -h "$SNOWSQL_ACCOUNT.snowflakecomputing.com" -p 443 \
            -q "SELECT CURRENT_VERSION(), CURRENT_ROLE(), CURRENT_WAREHOUSE();" \
            -o exit_on_error=true

      - name: Run changed SQL scripts on PRD
        env:
          SNOWSQL_ACCOUNT: ${{ secrets.SNOWSQL_ACCOUNT }}
          SNOWSQL_USER: ${{ secrets.SNOWSQL_USER }}
          SNOWSQL_PWD: ${{ secrets.SNOWSQL_PWD }}
        run: |
          set -e
          
          # Ensure PRD schema exists
          echo "Creating PRD schema if not exists..."
          snowsql -a "$SNOWSQL_ACCOUNT" -u "$SNOWSQL_USER" \
            -d "$SNOWSQL_DATABASE" \
            -h "$SNOWSQL_ACCOUNT.snowflakecomputing.com" -p 443 \
            -q "CREATE SCHEMA IF NOT EXISTS $SCHEMA_PRD;" \
            -o exit_on_error=true
          
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            MODIFIED_FILES=$(git diff --name-only HEAD~1 HEAD | grep '^snowflake/.*\.sql$' || true)
          else
            MODIFIED_FILES=$(git show --pretty='' --name-only HEAD | grep '^snowflake/.*\.sql$' || true)
          fi

          if [ -z "$MODIFIED_FILES" ]; then
            echo "No .sql files changed."
            exit 0
          fi

          ORDERED_FILES=$(echo "$MODIFIED_FILES" | while read -r file; do
            if [[ "$file" == *"/tasks/"* ]]; then
              echo "4:$file"
            elif [[ "$file" == *"/bronze/"* ]]; then
              echo "1:$file"
            elif [[ "$file" == *"/silver/"* ]]; then
              echo "2:$file"
            elif [[ "$file" == *"/gold/"* ]]; then
              echo "3:$file"
            else
              echo "0:$file"
            fi
          done | sort -t: -k1,1n | cut -d: -f2-)

          for file in $ORDERED_FILES; do
            echo "Running $file on schema $SCHEMA_PRD"
            OUTPUT=$(snowsql -a "$SNOWSQL_ACCOUNT" -u "$SNOWSQL_USER" \
              -d "$SNOWSQL_DATABASE" -s "$SCHEMA_PRD" \
              -h "$SNOWSQL_ACCOUNT.snowflakecomputing.com" -p 443 \
              -f "$file" \
              -o exit_on_error=true)
            echo "$OUTPUT"

            if [[ "$file" == snowflake/procedures/* ]]; then
              PROC_NAME=$(echo "$OUTPUT" | grep -oP 'Function \K[^ ]+' | head -1)
              if [[ -n "$PROC_NAME" ]]; then
                echo "Calling procedure $PROC_NAME on schema $SCHEMA_PRD"
                snowsql -a "$SNOWSQL_ACCOUNT" -u "$SNOWSQL_USER" \
                  -d "$SNOWSQL_DATABASE" -s "$SCHEMA_PRD" \
                  -h "$SNOWSQL_ACCOUNT.snowflakecomputing.com" -p 443 \
                  -q "CALL $PROC_NAME();" \
                  -o exit_on_error=true
              else
                echo "Could not extract the procedure name from the SnowSQL output for file $file"
              fi
            fi
          done
