name: Deploy Snowflake

on:
  push:
    branches:
      - main
      - 'feature/**'
  workflow_dispatch:

jobs:

  deploy-qa:
    name: Deploy to QA
    runs-on: ubuntu-latest
    env:
      SF_ACCOUNT: MKQAYBK-CK27934
      SF_USER: MARCIOMICHELOTTO
      SF_ROLE: ACCOUNTADMIN
      SF_WAREHOUSE: COMPUTE_WH
      SF_DATABASE: FORMACAO
      SF_SCHEMA_QA: QA
      SF_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs

      - name: Configure Snowflake connection (QA)
        run: |
          mkdir -p ~/.snowflake
          python3 -c "
import os
config = f'''[connections.default]
account = \"{os.environ['SF_ACCOUNT']}\"
user = \"{os.environ['SF_USER']}\"
password = \"{os.environ['SF_PASSWORD']}\"
role = \"{os.environ['SF_ROLE']}\"
warehouse = \"{os.environ['SF_WAREHOUSE']}\"
database = \"{os.environ['SF_DATABASE']}\"
schema = \"{os.environ['SF_SCHEMA_QA']}\"
'''
with open(os.path.expanduser('~/.snowflake/config.toml'), 'w') as f:
    f.write(config)
"
          chmod 0600 ~/.snowflake/config.toml

      - name: Deploy Tables - Bronze (QA)
        run: |
          for f in snowflake/tables/bronze/*.sql; do
            echo "Deploying $f to QA"
            snow sql -f "$f"
          done

      - name: Deploy Tables - Silver (QA)
        run: |
          for f in snowflake/tables/silver/*.sql; do
            echo "Deploying $f to QA"
            snow sql -f "$f"
          done

      - name: Deploy Tables - Gold (QA)
        run: |
          for f in snowflake/tables/gold/*.sql; do
            echo "Deploying $f to QA"
            snow sql -f "$f"
          done

      - name: Deploy Procedures - Bronze (QA)
        run: |
          for f in snowflake/procedures/bronze/*.sql; do
            echo "Deploying $f to QA"
            snow sql -f "$f"
          done

      - name: Deploy Procedures - Silver (QA)
        run: |
          for f in snowflake/procedures/silver/*.sql; do
            echo "Deploying $f to QA"
            snow sql -f "$f"
          done

      - name: Deploy Procedures - Gold (QA)
        run: |
          for f in snowflake/procedures/gold/*.sql; do
            echo "Deploying $f to QA"
            snow sql -f "$f"
          done

      - name: Deploy Tasks (QA)
        run: snow sql -f snowflake/tasks/tasks_pipeline.sql

      - name: QA deploy completed
        run: echo "Deploy QA concluido com sucesso!"

  deploy-prd:
    name: Deploy to PRD
    runs-on: ubuntu-latest
    needs: deploy-qa
    if: github.ref == 'refs/heads/main'
    env:
      SF_ACCOUNT: MKQAYBK-CK27934
      SF_USER: MARCIOMICHELOTTO
      SF_ROLE: ACCOUNTADMIN
      SF_WAREHOUSE: COMPUTE_WH
      SF_DATABASE: FORMACAO
      SF_SCHEMA_PRD: PRD
      SF_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs

      - name: Configure Snowflake connection (PRD)
        run: |
          mkdir -p ~/.snowflake
          python3 -c "
import os
config = f'''[connections.default]
account = \"{os.environ['SF_ACCOUNT']}\"
user = \"{os.environ['SF_USER']}\"
password = \"{os.environ['SF_PASSWORD']}\"
role = \"{os.environ['SF_ROLE']}\"
warehouse = \"{os.environ['SF_WAREHOUSE']}\"
database = \"{os.environ['SF_DATABASE']}\"
schema = \"{os.environ['SF_SCHEMA_PRD']}\"
'''
with open(os.path.expanduser('~/.snowflake/config.toml'), 'w') as f:
    f.write(config)
"
          chmod 0600 ~/.snowflake/config.toml

      - name: Deploy Tables - Bronze (PRD)
        run: |
          for f in snowflake/tables/bronze/*.sql; do
            echo "Deploying $f to PRD"
            snow sql -f "$f"
          done

      - name: Deploy Tables - Silver (PRD)
        run: |
          for f in snowflake/tables/silver/*.sql; do
            echo "Deploying $f to PRD"
            snow sql -f "$f"
          done

      - name: Deploy Tables - Gold (PRD)
        run: |
          for f in snowflake/tables/gold/*.sql; do
            echo "Deploying $f to PRD"
            snow sql -f "$f"
          done

      - name: Deploy Procedures - Bronze (PRD)
        run: |
          for f in snowflake/procedures/bronze/*.sql; do
            echo "Deploying $f to PRD"
            snow sql -f "$f"
          done

      - name: Deploy Procedures - Silver (PRD)
        run: |
          for f in snowflake/procedures/silver/*.sql; do
            echo "Deploying $f to PRD"
            snow sql -f "$f"
          done

      - name: Deploy Procedures - Gold (PRD)
        run: |
          for f in snowflake/procedures/gold/*.sql; do
            echo "Deploying $f to PRD"
            snow sql -f "$f"
          done

      - name: Deploy Tasks (PRD)
        run: snow sql -f snowflake/tasks/tasks_pipeline.sql

      - name: PRD deploy completed
        run: echo "Deploy PRD concluido com sucesso!"
